<style>
:root {
  --bg:        #f5f5f5;
  --bg2:       #ffffff;
  --surface:   #ffffff;
  --surface2:  #f0f0f0;
  --surface3:  #e0e0e0;
  --ink:       #1a1a2e;
  --ink2:      #4a4a6a;
  --muted:     #9090a8;
  --rule:      #e8e8f0;
  --accent:    #01b4e4;
  --accent2:   #0d253f;
  --cinema:    #e8a000;
  --stream:    #16a34a;
  --radius:    10px;
  --radius-sm: 6px;
  --font-title: 'Bebas Neue', sans-serif;
  --font-body:  'DM Sans', sans-serif;
  --safe-top:   env(safe-area-inset-top, 0px);
  --safe-bot:   env(safe-area-inset-bottom, 0px);
  --shadow:     0 2px 12px rgba(0,0,0,0.08);
  --shadow-md:  0 4px 24px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(255,255,255,0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--rule);
  padding: calc(var(--safe-top) + 10px) 20px 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 10px;
}

.logo {
  font-family: var(--font-title);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--accent2);
  line-height: 1;
}

.logo span { color: var(--accent); }

.header-actions { display: flex; gap: 8px; align-items: center; }

.btn-icon {
  background: var(--surface2);
  border: 1px solid var(--rule);
  color: var(--ink2);
  border-radius: var(--radius-sm);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
.btn-icon:hover { background: var(--surface3); color: var(--ink); }

/* ─── TABS NAV ─── */
.tabs-nav {
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs-nav::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  padding: 10px 18px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.tab-btn:hover { color: var(--ink2); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-badge {
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 8px;
  line-height: 14px;
  display: none;
}
.tab-badge.visible { display: inline-block; }

/* ─── MAIN ─── */
#appContent { min-height: calc(100vh - 88px); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ─── SECTION TITLE ─── */
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 28px 20px 14px;
}
.section-title {
  font-family: var(--font-title);
  font-size: 26px;
  letter-spacing: 0.5px;
  color: var(--ink);
}
.section-sub {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* ─── SEARCH BAR ─── */
.search-bar {
  padding: 0 20px 16px;
}
.search-row {
  display: flex;
  background: var(--surface2);
  border-radius: var(--radius);
  border: 1.5px solid var(--rule);
  overflow: hidden;
  transition: border-color 0.2s;
}
.search-row:focus-within { border-color: var(--accent); }
.search-row input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--ink);
  min-width: 0;
}
.search-row input::placeholder { color: var(--muted); }
.btn-search {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 0 18px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn-search:hover { opacity: 0.88; }
.btn-search:disabled { opacity: 0.4; cursor: default; }

/* ─── MOVIE GRID ─── */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 16px;
  padding: 0 16px 32px;
}
@media (min-width: 600px) {
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 20px; padding: 0 24px 40px; }
}

/* ─── MOVIE CARD ─── */
.movie-card {
  position: relative;
  border-radius: var(--radius);
  overflow: visible;
  cursor: pointer;
  transition: transform 0.2s;
}
.movie-card:hover { transform: translateY(-3px); }

.card-poster-wrap {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 2/3;
  background: var(--surface2);
  box-shadow: var(--shadow);
}

.card-poster {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.movie-card:hover .card-poster { transform: scale(1.03); }

.card-poster-ph {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  color: var(--muted);
}

/* Score badge */
.score-badge {
  position: absolute;
  top: 7px;
  left: 7px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  color: var(--ink);
  font-size: 11px;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 20px;
  line-height: 1.4;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

/* Add to fav button */
.btn-add-fav {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  border: none;
  border-radius: 50%;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.btn-add-fav:hover { background: var(--accent); color: #fff; transform: scale(1.15); }
.btn-add-fav.saved { background: var(--accent); color: #fff; }

.card-info { padding: 8px 2px 0; }
.card-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-date { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Fav extras under card */
.fav-date-line {
  font-size: 10px;
  color: var(--ink2);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 3px;
}
.dot-cinema { width:6px;height:6px;border-radius:50%;background:var(--cinema);flex-shrink:0; }
.dot-stream  { width:6px;height:6px;border-radius:50%;background:var(--stream);flex-shrink:0; }

/* "Vu" toggle button on card (left of fav button) */
.btn-watched {
  position: absolute;
  top: 7px;
  right: 43px;
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  border: none;
  border-radius: 50%;
  color: var(--muted);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  z-index: 10;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
.btn-watched:hover { background: var(--stream); color: #fff; transform: scale(1.15); }
.btn-watched.on { background: var(--stream); color: #fff; }

/* Dim watched posters slightly so the to-watch pile stands out */
.movie-card.is-watched .card-poster-wrap { opacity: 0.62; }
.movie-card.is-watched:hover .card-poster-wrap { opacity: 1; }

/* "Vu" ribbon */
.watched-ribbon {
  position: absolute;
  bottom: 7px;
  left: 7px;
  background: var(--stream);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 3px 7px;
  border-radius: 12px;
  text-transform: uppercase;
  z-index: 5;
}

/* Star rating row under a watched fav card */
.card-rating {
  display: flex;
  gap: 1px;
  margin-top: 4px;
}
.card-rating .star {
  cursor: pointer;
  font-size: 13px;
  color: var(--surface3);
  line-height: 1;
  transition: color 0.1s, transform 0.1s;
}
.card-rating .star.filled { color: var(--cinema); }
.card-rating .star:hover { transform: scale(1.25); }
.card-rating-value {
  font-size: 10px;
  font-weight: 600;
  color: var(--cinema);
  margin-left: 4px;
  align-self: center;
}

/* Filter pills (Favoris: Tous / À voir / Vus) */
.filter-pills {
  display: flex;
  gap: 8px;
  padding: 0 20px 14px;
  flex-wrap: wrap;
}
.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--rule);
  background: var(--surface);
  color: var(--ink2);
  transition: all 0.15s;
  font-family: var(--font-body);
}
.filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.filter-pill .count { opacity: 0.7; font-size: 11px; margin-left: 3px; }

/* "Nouveau en streaming" alert banner */
.stream-alert {
  margin: 0 20px 16px;
  background: #f0fdf4;
  border: 1.5px solid rgba(22,163,74,0.3);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.stream-alert-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 600;
  color: var(--stream);
}
.stream-alert-head .close {
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
  background: none;
  border: none;
  line-height: 1;
}
.stream-alert-item {
  font-size: 12px;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
}
.stream-alert-item:hover { color: var(--stream); }
.stream-alert-item .mini-poster {
  width: 26px; height: 39px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--surface2);
}

/* Rating block inside modal */
.modal-rating-row {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 12px;
}
.modal-rating-row .m-star {
  cursor: pointer;
  font-size: 24px;
  color: var(--surface3);
  line-height: 1;
  transition: color 0.1s, transform 0.1s;
}
.modal-rating-row .m-star.filled { color: var(--cinema); }
.modal-rating-row .m-star:hover { transform: scale(1.2); }
.modal-rating-clear {
  margin-left: 8px;
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
}

/* ─── SUB TABS (À venir / Agenda) ─── */
.sub-tabs {
  display: flex;
  gap: 8px;
  padding: 0 20px 16px;
  flex-wrap: wrap;
}
.sub-btn {
  padding: 7px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--rule);
  background: var(--surface);
  color: var(--ink2);
  transition: all 0.15s;
  font-family: var(--font-body);
}
.sub-btn.active-cinema { background: #fff8e6; color: var(--cinema); border-color: rgba(232,160,0,0.4); }
.sub-btn.active-stream { background: #f0fdf4; color: var(--stream); border-color: rgba(22,163,74,0.35); }

.sub-panel { display: none; }
.sub-panel.visible { display: block; }

/* ─── LOADER ─── */
.loader-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--muted);
  gap: 10px;
}
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--surface3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── EMPTY STATE ─── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 80px 20px;
  color: var(--muted);
  gap: 12px;
  text-align: center;
}
.empty-state .icon { font-size: 48px; opacity: 0.4; }
.empty-state p { font-size: 13px; }

/* ─── STATUS NOTE ─── */
.status-note {
  padding: 14px 20px;
  color: var(--muted);
  font-size: 12px;
}
.status-note.err { color: #dc2626; }

/* ─── SKELETON ─── */
.skeleton-card .card-poster-wrap {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer {
  from { background-position: 200% 0; }
  to   { background-position: -200% 0; }
}

/* ─── MOVIE DETAIL MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(3px);
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

@media (min-width: 600px) { .modal-overlay { align-items: center; } }

.modal-sheet {
  width: 100%;
  max-width: 680px;
  max-height: 92vh;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  box-shadow: var(--shadow-md);
}
@media (min-width: 600px) { .modal-sheet { border-radius: 20px; max-height: 88vh; } }

.modal-scroll {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}

.modal-backdrop { width:100%;height:220px;object-fit:cover;display:block;flex-shrink:0; }
.modal-backdrop-ph { width:100%;height:220px;background:linear-gradient(135deg,var(--surface2) 0%,var(--surface3) 100%);flex-shrink:0; }
.modal-backdrop-wrap { position:relative;flex-shrink:0; }
.modal-backdrop-grad { position:absolute;bottom:0;left:0;right:0;height:140px;background:linear-gradient(to top,var(--bg2),transparent); }

.modal-content { padding: 0 20px 32px; }

.modal-poster-row { display:flex;gap:16px;margin-top:-70px;position:relative;z-index:2;margin-bottom:16px; }
.modal-poster { width:90px;height:135px;object-fit:cover;border-radius:var(--radius);box-shadow:var(--shadow-md);flex-shrink:0; }
.modal-poster-ph { width:90px;height:135px;background:var(--surface2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--muted);flex-shrink:0; }

.modal-title-block { display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:4px;min-width:0; }
.modal-title { font-family:var(--font-title);font-size:24px;letter-spacing:0.4px;line-height:1.1;color:var(--ink); }
.modal-tagline { font-size:12px;color:var(--muted);font-style:italic;margin-top:4px; }

.modal-meta-pills { display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px; }
.mpill { padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:0.02em; }
.mpill-score { background:rgba(1,180,228,0.1);color:var(--accent);border:1px solid rgba(1,180,228,0.3); }
.mpill-genre { background:var(--surface2);color:var(--ink2); }
.mpill-runtime { background:var(--surface2);color:var(--ink2); }

.modal-section-title { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin:20px 0 10px; }

.modal-overview { font-size:13px;color:var(--ink2);line-height:1.65; }

/* Release grid */
.release-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px; }
.release-item { background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;border-left:3px solid transparent; }
.release-item.cinema { border-left-color:var(--cinema); }
.release-item.stream  { border-left-color:var(--stream); }
.release-type { font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px; }
.release-item.cinema .release-type { color:var(--cinema); }
.release-item.stream  .release-type { color:var(--stream); }
.release-date-val { font-size:13px;font-weight:500;color:var(--ink); }
.release-platform { font-size:11px;color:var(--muted);margin-top:2px; }

/* Cast */
.cast-row { display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px; }
.cast-row::-webkit-scrollbar { display:none; }
.cast-item { flex-shrink:0;text-align:center;width:68px; }
.cast-photo { width:56px;height:56px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 5px;background:var(--surface2); }
.cast-photo-ph { width:56px;height:56px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);margin:0 auto 5px; }
.cast-name { font-size:10px;font-weight:500;color:var(--ink);line-height:1.3;word-break:break-word; }
.cast-char { font-size:10px;color:var(--muted);margin-top:2px;line-height:1.2; }

.modal-close-btn { position:absolute;top:12px;right:12px;width:32px;height:32px;background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);border:1px solid var(--rule);border-radius:50%;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10; }

/* ─── TRAILER ─── */
.trailer-play-btn {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 6;
  background: rgba(0,0,0,0.15);
  transition: background 0.15s;
}
.trailer-play-btn:hover { background: rgba(0,0,0,0.28); }
.trailer-play-circle {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: rgba(255,255,255,0.94);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 18px rgba(0,0,0,0.35);
  transition: transform 0.15s;
}
.trailer-play-btn:hover .trailer-play-circle { transform: scale(1.1); }
.trailer-play-circle svg { width: 24px; height: 24px; fill: var(--accent2); margin-left: 3px; }
.trailer-label {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 14px;
  z-index: 6;
  letter-spacing: 0.03em;
}
.trailer-iframe-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  flex-shrink: 0;
}
.trailer-iframe-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }

/* ─── FILMOGRAPHY OVERLAY (stacked over the movie modal) ─── */
.person-layer {
  position: absolute;
  inset: 0;
  background: var(--bg2);
  z-index: 20;
  display: none;
  flex-direction: column;
  border-radius: 20px 20px 0 0;
  overflow: hidden;
}
@media (min-width: 600px) { .person-layer { border-radius: 20px; } }
.person-layer.open { display: flex; }
.person-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.person-back {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1.5px solid var(--rule);
  background: var(--surface);
  color: var(--ink);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.person-back:hover { background: var(--surface2); }
.person-photo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
.person-photo-ph { width: 44px; height: 44px; border-radius: 50%; background: var(--surface2); display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);flex-shrink:0; }
.person-name { font-family: var(--font-title); font-size: 20px; letter-spacing: 0.4px; color: var(--ink); line-height: 1.1; }
.person-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.person-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; flex: 1; }
.person-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
  gap: 14px;
}
.pfilm { cursor: pointer; }
.pfilm-poster-wrap { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 2/3; background: var(--surface2); box-shadow: var(--shadow); }
.pfilm-poster { width: 100%; height: 100%; object-fit: cover; display: block; }
.pfilm-poster-ph { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--muted); }
.pfilm-title { font-size: 11px; font-weight: 500; color: var(--ink); margin-top: 5px; line-height: 1.25; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
.pfilm-year { font-size: 10px; color: var(--muted); margin-top: 1px; }
.pfilm-char { font-size: 10px; color: var(--muted); margin-top: 1px; font-style: italic; display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden; }

/* Make cast photos look tappable */
.cast-item.clickable { cursor: pointer; }
.cast-item.clickable .cast-photo, .cast-item.clickable .cast-photo-ph { transition: transform 0.12s, box-shadow 0.12s; }
.cast-item.clickable:hover .cast-photo, .cast-item.clickable:hover .cast-photo-ph { transform: scale(1.08); box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

.modal-fav-btn { display:flex;align-items:center;gap:6px;padding:11px 18px;border-radius:var(--radius);border:1.5px solid var(--rule);background:var(--surface2);color:var(--ink2);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;width:100%;justify-content:center;margin-top:20px; }
.modal-fav-btn:hover { background:var(--accent);color:#fff;border-color:var(--accent); }
.modal-fav-btn.saved { background:rgba(1,180,228,0.1);color:var(--accent);border-color:rgba(1,180,228,0.4); }

/* ICS button */
.btn-ics { background:none;border:1.5px solid var(--rule);color:var(--ink2);padding:4px 9px;border-radius:var(--radius-sm);font-size:10px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-top:5px;transition:all 0.15s;font-family:var(--font-body); }
.btn-ics:hover { background:var(--surface2);color:var(--ink); }
.btn-ics svg { width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2; }

/* ─── LOAD MORE ─── */
.load-more-wrap {
  display: flex;
  justify-content: center;
  padding: 8px 20px 40px;
}
.btn-load-more {
  background: var(--surface);
  border: 1.5px solid var(--rule);
  color: var(--accent);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 600;
  padding: 11px 28px;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-load-more:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-load-more:disabled { opacity: 0.5; cursor: default; }
.btn-load-more .spinner { width: 14px; height: 14px; border-width: 2px; }

/* ─── TOAST ─── */
.toast { position:fixed;bottom:calc(20px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.28s;pointer-events:none;z-index:999;white-space:nowrap; }
.toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

/* Upcoming card ICS overlay */
.upcoming-ics-wrap {
  position: absolute;
  bottom: 7px;
  left: 7px;
  right: 7px;
  display: flex;
  justify-content: center;
}
.upcoming-ics-wrap .btn-ics {
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(6px);
  width: 100%;
  justify-content: center;
  border-radius: var(--radius-sm);
}

/* Stream platform under card */
.stream-platform-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--stream);
  margin-top: 3px;
}

@media (max-width: 400px) {
  .movie-grid { grid-template-columns: repeat(2,1fr); gap:12px; padding:0 12px 24px; }
  .modal-content { padding: 0 14px 28px; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">CINÉ<span>TRACKER</span></div>
    <div class="header-actions">
      <button class="btn-icon" onclick="exportData()" title="Exporter favoris">⬆</button>
      <label class="btn-icon" title="Importer favoris" style="cursor:pointer">
        ⬇<input type="file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
    </div>
  </div>
  <nav class="tabs-nav">
    <button class="tab-btn active" onclick="switchTab('search',this)">🔍 Recherche</button>
    <button class="tab-btn" onclick="switchTab('popular',this)">🔥 Populaires</button>
    <button class="tab-btn" onclick="switchTab('upcoming',this)">🎬 À venir <span class="tab-badge" id="badge-upcoming"></span></button>
    <button class="tab-btn" onclick="switchTab('agenda',this)">📅 Agenda <span class="tab-badge" id="badge-agenda"></span></button>
    <button class="tab-btn" onclick="switchTab('favs',this)">★ Favoris <span class="tab-badge" id="badge-favs"></span></button>
  </nav>
</header>

<div id="appContent">

  <!-- SEARCH -->
  <div class="tab-panel active" id="tab-search">
    <div class="section-head">
      <div class="section-title">Recherche</div>
    </div>
    <div class="search-bar">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Titre d'un film…" autocomplete="off">
        <button class="btn-search" id="btnSearch" onclick="doSearch()">Chercher</button>
      </div>
    </div>
    <div id="searchStatus" class="status-note" style="display:none"></div>
    <div class="movie-grid" id="grid-search" style="display:none"></div>
  </div>

  <!-- POPULAR -->
  <div class="tab-panel" id="tab-popular">
    <div class="section-head">
      <div class="section-title">Populaires</div>
      <div class="section-sub" id="popular-date"></div>
    </div>
    <div class="movie-grid" id="grid-popular">
      <div class="movie-card skeleton-card" style="pointer-events:none"><div class="card-poster-wrap" style="aspect-ratio:2/3"></div></div>
      <div class="movie-card skeleton-card" style="pointer-events:none"><div class="card-poster-wrap" style="aspect-ratio:2/3"></div></div>
      <div class="movie-card skeleton-card" style="pointer-events:none"><div class="card-poster-wrap" style="aspect-ratio:2/3"></div></div>
      <div class="movie-card skeleton-card" style="pointer-events:none"><div class="card-poster-wrap" style="aspect-ratio:2/3"></div></div>
    </div>
  </div>

  <!-- UPCOMING -->
  <div class="tab-panel" id="tab-upcoming">
    <div class="section-head">
      <div class="section-title">À Venir</div>
    </div>
    <div class="sub-tabs">
      <button class="sub-btn active-cinema" id="subUpCinema" onclick="switchSubTab('upcoming','cinema')">🎞 Cinéma</button>
      <button class="sub-btn" id="subUpStream" onclick="switchSubTab('upcoming','stream')">📺 Streaming</button>
    </div>
    <div class="sub-panel visible" id="upcoming-cinema-panel">
      <div class="movie-grid" id="grid-upcoming-cinema">
        <div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
    </div>
    <div class="sub-panel" id="upcoming-stream-panel">
      <div class="movie-grid" id="grid-upcoming-stream">
        <div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
    </div>
  </div>

  <!-- AGENDA -->
  <div class="tab-panel" id="tab-agenda">
    <div class="section-head">
      <div class="section-title">Agenda</div>
      <div class="section-sub" id="agenda-sub">Sorties à venir de vos favoris</div>
    </div>
    <div class="sub-tabs">
      <button class="sub-btn active-cinema" id="subAgCinema" onclick="switchSubTab('agenda','cinema')">🎞 Cinéma</button>
      <button class="sub-btn" id="subAgStream" onclick="switchSubTab('agenda','stream')">📺 Streaming</button>
    </div>
    <div class="sub-panel visible" id="agenda-cinema-panel">
      <div class="movie-grid" id="grid-agenda-cinema"></div>
    </div>
    <div class="sub-panel" id="agenda-stream-panel">
      <div class="movie-grid" id="grid-agenda-stream"></div>
    </div>

  <!-- FAVORITES -->
  <div class="tab-panel" id="tab-favs">

      <div class="section-title">Mes Favoris</div>
      <div class="section-sub" id="favs-count-label"></div>

    <div id="streamAlert"></div>
    <div class="filter-pills" id="favFilters" style="display:none">
      <button class="filter-pill active" data-filter="all" onclick="setFavFilter('all',this)">Tous <span class="count" id="cnt-all"></span></button>
      <button class="filter-pill" data-filter="towatch" onclick="setFavFilter('towatch',this)">À voir <span class="count" id="cnt-towatch"></span></button>
      <button class="filter-pill" data-filter="watched" onclick="setFavFilter('watched',this)">Vus <span class="count" id="cnt-watched"></span></button>
    </div>
    <div class="movie-grid" id="grid-favs"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const API_KEY  = '729cf9f096e955020bb7d27c547be637';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG_BASE = 'https://image.tmdb.org/t/p';
const STORE_KEY = 'cinetracker-v2';

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let S = { favs: [] };

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) S = { ...S, ...JSON.parse(raw) };
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(S)); } catch(e) {}
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function h(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function daysLabel(n) {
  if (n < 0) return 'Sorti';
  if (n === 0) return "Aujourd'hui !";
  if (n === 1) return 'Demain';
  return `Dans ${n} j.`;
}

function showToast(msg, dur=2600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

async function tmdb(path, params={}) {
  const url = new URL(BASE_URL + path);
  url.searchParams.set('api_key', API_KEY);
  url.searchParams.set('language', 'fr-FR');
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url.toString());
  if (!r.ok) throw new Error('TMDB ' + r.status);
  return r.json();
}

// Same call but in English (used as a fallback for trailers, which are
// often missing in the FR localization).
async function tmdbEn(path, params={}) {
  const url = new URL(BASE_URL + path);
  url.searchParams.set('api_key', API_KEY);
  url.searchParams.set('language', 'en-US');
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  const r = await fetch(url.toString());
  if (!r.ok) throw new Error('TMDB ' + r.status);
  return r.json();
}

// Choose the most relevant YouTube trailer key from a /videos result list.
// Priority: official Trailer > any Trailer > Teaser. YouTube only.
function pickTrailer(videos) {
  const yt = (videos || []).filter(v => v.site === 'YouTube' && v.key);
  if (!yt.length) return null;
  const score = v => {
    let s = 0;
    if (v.type === 'Trailer') s += 10;
    else if (v.type === 'Teaser') s += 5;
    if (v.official) s += 3;
    return s;
  };
  yt.sort((a,b) => score(b) - score(a));
  return yt[0].key;
}

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
const tabLoaded = {};

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');

  if (name === 'popular' && !tabLoaded.popular) { tabLoaded.popular = true; loadPopular(); }
  if (name === 'upcoming' && !tabLoaded.upcoming) { tabLoaded.upcoming = true; loadUpcoming(); }
  if (name === 'favs') { renderStreamAlert(); renderFavs(); }
  if (name === 'agenda') renderAgenda();
}

/* Sub-tabs state */
const subTabState = { upcoming: 'cinema', agenda: 'cinema' };

function switchSubTab(section, type) {
  subTabState[section] = type;
  const other = type === 'cinema' ? 'stream' : 'cinema';
  const cinBtn = document.getElementById('sub' + (section==='upcoming'?'Up':'Ag') + 'Cinema');
  const stBtn  = document.getElementById('sub' + (section==='upcoming'?'Up':'Ag') + 'Stream');
  cinBtn.className = 'sub-btn' + (type==='cinema' ? ' active-cinema' : '');
  stBtn.className  = 'sub-btn' + (type==='stream'  ? ' active-stream'  : '');
  document.getElementById(section + '-cinema-panel').classList.toggle('visible', type==='cinema');
  document.getElementById(section + '-stream-panel').classList.toggle('visible', type==='stream');
}

/* ═══════════════════════════════════════════
   FAVORITES
═══════════════════════════════════════════ */
function isFav(movieId) { return S.favs.some(f => f.id === movieId); }
function getFav(movieId) { return S.favs.find(f => f.id === movieId); }
function isWatched(movieId) { const f = getFav(movieId); return !!(f && f.watched); }
function getRating(movieId) { const f = getFav(movieId); return f && f.rating ? f.rating : 0; }

function toggleFav(movie) {
  const idx = S.favs.findIndex(f => f.id === movie.id);
  if (idx >= 0) {
    S.favs.splice(idx, 1);
    showToast('✕ Retiré des favoris');
  } else {
    S.favs.push(movie);
    showToast('★ Ajouté aux favoris');
  }
  saveState();
  updateBadges();
  // Refresh all fav buttons in grids
  document.querySelectorAll(`.btn-add-fav[data-id="${movie.id}"]`).forEach(btn => {
    btn.classList.toggle('saved', isFav(movie.id));
    btn.textContent = isFav(movie.id) ? '★' : '+';
  });
  // Refresh modal fav btn
  const mfb = document.getElementById('modal-fav-btn');
  if (mfb && Number(mfb.dataset.id) === movie.id) {
    mfb.className = 'modal-fav-btn' + (isFav(movie.id) ? ' saved' : '');
    mfb.innerHTML = isFav(movie.id) ? '★ Dans mes favoris' : '☆ Ajouter aux favoris';
  }
}

// Mark a favorite as watched / to-watch. Only meaningful for favorites;
// if the movie isn't a favorite yet, marking watched also adds it.
function toggleWatched(movie) {
  let fav = getFav(movie.id);
  if (!fav) {
    S.favs.push(movie);
    fav = getFav(movie.id);
    showToast('★ Ajouté · ✓ Vu');
  } else {
    fav.watched = !fav.watched;
    showToast(fav.watched ? '✓ Marqué comme vu' : '↩ Remis à voir');
    if (!fav.watched) fav.rating = 0; // clearing watched also clears rating
  }
  if (fav.watched === undefined) fav.watched = true;
  saveState();
  updateBadges();
  // Refresh watched buttons in grids
  document.querySelectorAll(`.btn-watched[data-id="${movie.id}"]`).forEach(btn => {
    btn.classList.toggle('on', isWatched(movie.id));
  });
  // Refresh fav button (in case we just added)
  document.querySelectorAll(`.btn-add-fav[data-id="${movie.id}"]`).forEach(btn => {
    btn.classList.toggle('saved', isFav(movie.id));
    btn.textContent = isFav(movie.id) ? '★' : '+';
  });
}

function setRating(movieId, value) {
  const fav = getFav(movieId);
  if (!fav) return;
  // Clicking the current value again clears it
  fav.rating = (fav.rating === value) ? 0 : value;
  if (fav.rating && !fav.watched) fav.watched = true; // rating implies watched
  saveState();
  updateBadges();
}

function updateBadges() {
  const fb = document.getElementById('badge-favs');
  const toWatch = S.favs.filter(f => !f.watched).length;
  fb.textContent = toWatch || '';
  fb.classList.toggle('visible', toWatch > 0);
}

/* ═══════════════════════════════════════════
   MAKE POSTER CARD
═══════════════════════════════════════════ */
function makePosterEl(movie, options={}) {
  // options: { showIcs, showDays, showStreamLabel, streamLabel, favExtras, favControls }
  const card = document.createElement('div');
  card.className = 'movie-card' + (options.favControls && isWatched(movie.id) ? ' is-watched' : '');

  const posterWrap = document.createElement('div');
  posterWrap.className = 'card-poster-wrap';

  if (movie.poster_path) {
    const img = document.createElement('img');
    img.className = 'card-poster';
    img.src = IMG_BASE + '/w342' + movie.poster_path;
    img.alt = '';
    img.loading = 'lazy';
    posterWrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-poster-ph';
    ph.textContent = '🎬';
    posterWrap.appendChild(ph);
  }

  if (movie.vote_average && movie.vote_average > 0) {
    const score = document.createElement('div');
    score.className = 'score-badge';
    score.textContent = '★ ' + movie.vote_average.toFixed(1);
    posterWrap.appendChild(score);
  }

  const favBtn = document.createElement('button');
  favBtn.className = 'btn-add-fav' + (isFav(movie.id) ? ' saved' : '');
  favBtn.dataset.id = movie.id;
  favBtn.textContent = isFav(movie.id) ? '★' : '+';
  favBtn.title = 'Favoris';
  favBtn.addEventListener('click', e => {
    e.stopPropagation();
    toggleFav(movie);
  });
  posterWrap.appendChild(favBtn);

  // Watched toggle (favorites view only)
  if (options.favControls) {
    const wBtn = document.createElement('button');
    wBtn.className = 'btn-watched' + (isWatched(movie.id) ? ' on' : '');
    wBtn.dataset.id = movie.id;
    wBtn.textContent = '✓';
    wBtn.title = isWatched(movie.id) ? 'Vu — cliquer pour remettre à voir' : 'Marquer comme vu';
    wBtn.addEventListener('click', e => {
      e.stopPropagation();
      toggleWatched(movie);
      // re-render the favorites grid to move the card to the right filter
      renderFavs();
    });
    posterWrap.appendChild(wBtn);

    if (isWatched(movie.id)) {
      const ribbon = document.createElement('div');
      ribbon.className = 'watched-ribbon';
      ribbon.textContent = '✓ Vu';
      posterWrap.appendChild(ribbon);
    }
  }

  // ICS overlay button for upcoming cinema
  if (options.showIcs && movie.release_date) {
    const icsWrap = document.createElement('div');
    icsWrap.className = 'upcoming-ics-wrap';
    const icsBtn = document.createElement('button');
    icsBtn.className = 'btn-ics';
    icsBtn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Calendrier`;
    icsBtn.addEventListener('click', e => {
      e.stopPropagation();
      downloadIcs(movie.title || movie.original_title, movie.release_date, 'Cinéma');
    });
    icsWrap.appendChild(icsBtn);
    posterWrap.appendChild(icsWrap);
  }

  const info = document.createElement('div');
  info.className = 'card-info';

  const title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = movie.title || movie.original_title;

  const date = document.createElement('div');
  date.className = 'card-date';

  if (options.showDays && movie.release_date) {
    const days = daysUntil(movie.release_date);
    date.textContent = fmtDate(movie.release_date) + ' · ' + daysLabel(days);
    date.style.color = days <= 7 ? 'var(--cinema)' : 'var(--muted)';
  } else if (options.showStreamLabel && options.streamLabel) {
    date.textContent = options.streamLabel;
    date.style.color = 'var(--stream)';
  } else {
    date.textContent = movie.release_date ? fmtDate(movie.release_date) : '';
  }

  info.appendChild(title);
  info.appendChild(date);

  // Fav extras (cinema date + streaming platforms)
  if (options.favExtras) {
    if (movie.release_date) {
      const cinLine = document.createElement('div');
      cinLine.className = 'fav-date-line';
      const dot = document.createElement('div'); dot.className = 'dot-cinema';
      const txt = document.createElement('span');
      txt.textContent = '🎞 ' + fmtDate(movie.release_date);
      cinLine.appendChild(dot); cinLine.appendChild(txt);
      info.appendChild(cinLine);
    }
    if (movie._streamPlatforms && movie._streamPlatforms.length) {
      const stLine = document.createElement('div');
      stLine.className = 'fav-date-line';
      const dot = document.createElement('div'); dot.className = 'dot-stream';
      const txt = document.createElement('span');
      txt.textContent = '📺 ' + movie._streamPlatforms.join(', ');
      stLine.appendChild(dot); stLine.appendChild(txt);
      info.appendChild(stLine);
    }
  }

  // Inline star rating for watched favorites (1-5 stars = /10 in steps of 2)
  if (options.favControls && isWatched(movie.id)) {
    info.appendChild(makeStarRow(movie.id, () => renderFavs()));
  }

  card.appendChild(posterWrap);
  card.appendChild(info);
  card.addEventListener('click', () => openMovieModal(movie.id));
  return card;
}

// 5-star row mapping to a /10 rating (each star = 2 points).
function makeStarRow(movieId, onChange) {
  const wrap = document.createElement('div');
  wrap.className = 'card-rating';
  const current = getRating(movieId); // 0..10
  for (let i = 1; i <= 5; i++) {
    const star = document.createElement('span');
    star.className = 'star' + (current >= i*2 ? ' filled' : '');
    star.textContent = '★';
    star.addEventListener('click', e => {
      e.stopPropagation();
      setRating(movieId, i*2);
      if (onChange) onChange();
    });
    wrap.appendChild(star);
  }
  if (current) {
    const val = document.createElement('span');
    val.className = 'card-rating-value';
    val.textContent = current + '/10';
    wrap.appendChild(val);
  }
  return wrap;
}

function renderGrid(containerId, movies, options={}) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  if (!movies || !movies.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.gridColumn = '1/-1';
    empty.innerHTML = '<div class="icon">🎬</div><p>Aucun film trouvé</p>';
    grid.appendChild(empty);
    return;
  }
  for (const m of movies) grid.appendChild(makePosterEl(m, options));
}

// Append more cards to an existing grid (no clear)
function appendToGrid(containerId, movies, options={}) {
  const grid = document.getElementById(containerId);
  for (const m of movies) grid.appendChild(makePosterEl(m, options));
}

// Manage a "Afficher plus" button placed right after a grid.
// onMore is an async fn that loads + renders the next batch and returns
// whether more pages remain (boolean).
function setLoadMore(gridId, hasMore, onMore) {
  const grid = document.getElementById(gridId);
  const wrapId = gridId + '-more';
  let wrap = document.getElementById(wrapId);

  if (!hasMore) { if (wrap) wrap.remove(); return; }

  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = wrapId;
    wrap.className = 'load-more-wrap';
    const btn = document.createElement('button');
    btn.className = 'btn-load-more';
    btn.textContent = 'Afficher plus';
    wrap.appendChild(btn);
    grid.insertAdjacentElement('afterend', wrap);
  }

  const btn = wrap.querySelector('.btn-load-more');
  btn.onclick = async () => {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Chargement…';
    try {
      const more = await onMore();
      if (!more) { wrap.remove(); }
      else { btn.disabled = false; btn.textContent = 'Afficher plus'; }
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Réessayer';
    }
  };
}

/* ═══════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
});

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;

  const status = document.getElementById('searchStatus');
  const grid   = document.getElementById('grid-search');

  status.style.display = 'block';
  status.textContent = 'Recherche en cours…';
  grid.style.display = 'none';
  grid.innerHTML = '';

  document.getElementById('btnSearch').disabled = true;

  try {
    const data = await tmdb('/search/movie', { query: q, include_adult: false });
    const results = (data.results || []).filter(m => m.poster_path || m.title);

    document.getElementById('btnSearch').disabled = false;

    if (!results.length) {
      status.textContent = 'Aucun résultat pour "' + q + '"';
      return;
    }

    status.textContent = results.length + ' résultat' + (results.length > 1 ? 's' : '') + ' pour "' + q + '"';
    grid.style.display = 'grid';
    renderGrid('grid-search', results);

  } catch(e) {
    document.getElementById('btnSearch').disabled = false;
    status.className = 'status-note err';
    status.textContent = 'Erreur : ' + e.message;
  }
}

/* ═══════════════════════════════════════════
   POPULAR
═══════════════════════════════════════════ */
const popularState = { page: 0, totalPages: 1, seen: new Set() };

async function loadPopular() {
  document.getElementById('popular-date').textContent =
    new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
  try {
    await fetchPopularPage(true);  // first page (clears grid)
    setLoadMore('grid-popular', popularState.page < popularState.totalPages, () => fetchPopularPage(false));
  } catch(e) {
    document.getElementById('grid-popular').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><p>Erreur de chargement</p></div>';
  }
}

async function fetchPopularPage(first) {
  let addedAny = false;
  let more = true;
  // Keep advancing pages until we actually surface new films (or run out)
  do {
    const data = await tmdb('/movie/popular', { page: popularState.page + 1, region: 'FR' });
    popularState.page = data.page;
    popularState.totalPages = Math.min(data.total_pages, 500);
    more = popularState.page < popularState.totalPages;

    const fresh = (data.results || []).filter(m => !popularState.seen.has(m.id));
    fresh.forEach(m => popularState.seen.add(m.id));

    if (fresh.length) {
      if (first && !addedAny) renderGrid('grid-popular', fresh);
      else appendToGrid('grid-popular', fresh);
      addedAny = true;
    }
  } while (!addedAny && more);

  return more;
}

/* ═══════════════════════════════════════════
   UPCOMING
═══════════════════════════════════════════ */
const upcomingState = {
  cinemaPage: 0, cinemaTotal: 1, cinemaSeen: new Set(), cinemaCount: 0,
  streamPage: 0, streamTotal: 1, streamSeen: new Set(),
};

async function loadUpcoming() {
  const gridCinema = document.getElementById('grid-upcoming-cinema');
  const gridStream = document.getElementById('grid-upcoming-stream');

  // ── CINEMA ──
  try {
    gridCinema.innerHTML = '<div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><span>Chargement…</span></div>';
    upcomingState.cinemaCount = 0;
    let firstDone = false;
    // Load 2 pages up front for a fuller initial view
    for (let i = 0; i < 2; i++) {
      const more = await fetchUpcomingCinemaPage(!firstDone);
      firstDone = true;
      if (!more) break;
    }
    if (!upcomingState.cinemaCount) {
      gridCinema.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎞</div><p>Aucune sortie cinéma à venir</p></div>';
    }
    setLoadMore('grid-upcoming-cinema', upcomingState.cinemaPage < upcomingState.cinemaTotal, () => fetchUpcomingCinemaPage(false));

    const ub = document.getElementById('badge-upcoming');
    ub.textContent = upcomingState.cinemaCount || '';
    ub.classList.toggle('visible', upcomingState.cinemaCount > 0);
  } catch(e) {
    gridCinema.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><p>Erreur : ' + h(e.message) + '</p></div>';
  }

  // ── STREAMING ──
  try {
    gridStream.innerHTML = '<div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><span>Chargement…</span></div>';
    let added = await fetchUpcomingStreamPage(true);
    if (!upcomingState.streamSeen.size) {
      gridStream.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📺</div><p>Aucun film en streaming détecté</p></div>';
    }
    setLoadMore('grid-upcoming-stream', upcomingState.streamPage < upcomingState.streamTotal, () => fetchUpcomingStreamPage(false));
  } catch(e) {
    gridStream.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div><p>Erreur : ' + h(e.message) + '</p></div>';
  }
}

async function fetchUpcomingCinemaPage(first) {
  const data = await tmdb('/movie/upcoming', { page: upcomingState.cinemaPage + 1, region: 'FR' });
  upcomingState.cinemaPage = data.page;
  upcomingState.cinemaTotal = Math.min(data.total_pages, 500);

  const today = new Date(); today.setHours(0,0,0,0);
  const batch = (data.results || [])
    .filter(m => m.release_date && new Date(m.release_date) >= today && !upcomingState.cinemaSeen.has(m.id))
    .sort((a,b) => new Date(a.release_date) - new Date(b.release_date));
  batch.forEach(m => upcomingState.cinemaSeen.add(m.id));
  upcomingState.cinemaCount += batch.length;

  if (first) renderGrid('grid-upcoming-cinema', batch, { showIcs: true, showDays: true });
  else appendToGrid('grid-upcoming-cinema', batch, { showIcs: true, showDays: true });

  // also bump badge as we discover more
  const ub = document.getElementById('badge-upcoming');
  ub.textContent = upcomingState.cinemaCount || '';
  ub.classList.toggle('visible', upcomingState.cinemaCount > 0);

  return upcomingState.cinemaPage < upcomingState.cinemaTotal;
}

async function fetchUpcomingStreamPage(first) {
  const sp = await tmdb('/movie/now_playing', { page: upcomingState.streamPage + 1, region: 'FR' });
  upcomingState.streamPage = sp.page;
  upcomingState.streamTotal = Math.min(sp.total_pages, 500);

  const candidates = (sp.results || []).filter(m => !upcomingState.streamSeen.has(m.id));
  const withStream = [];
  for (const m of candidates) {
    try {
      const wp = await tmdb('/movie/' + m.id + '/watch/providers');
      const fr = (wp.results || {}).FR || {};
      if (fr.flatrate && fr.flatrate.length) {
        upcomingState.streamSeen.add(m.id);
        withStream.push({ ...m, _streamPlatforms: fr.flatrate.slice(0,4).map(p => p.provider_name) });
      }
    } catch(e) {}
    await new Promise(r => setTimeout(r, 70));
  }

  const grid = document.getElementById('grid-upcoming-stream');
  if (first) grid.innerHTML = '';
  for (const m of withStream) {
    grid.appendChild(makePosterEl(m, {
      showStreamLabel: true,
      streamLabel: m._streamPlatforms ? m._streamPlatforms.join(' · ') : '',
    }));
  }

  return upcomingState.streamPage < upcomingState.streamTotal;
}

/* ═══════════════════════════════════════════

/* ═══════════════════════════════════════════
   AGENDA (upcoming from favorites)
   Cache-first: paint last known result instantly, refresh in the
   background, and only swap the display once the refresh completes.
═══════════════════════════════════════════ */
const AGENDA_CACHE_KEY = 'cinetracker-agenda-cache';
let _agendaRefreshing = false;

function loadAgendaCache() {
  try { return JSON.parse(localStorage.getItem(AGENDA_CACHE_KEY)); } catch(e) { return null; }
}
function saveAgendaCache(cinema, stream) {
  try { localStorage.setItem(AGENDA_CACHE_KEY, JSON.stringify({ cinema, stream, ts: Date.now() })); } catch(e) {}
}

// Pure render from data arrays (no network).
function paintAgenda(cinema, stream) {
  const gridCinema = document.getElementById('grid-agenda-cinema');
  const gridStream = document.getElementById('grid-agenda-stream');

  gridCinema.innerHTML = '';
  if (!cinema.length) {
    gridCinema.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎞</div><p>Aucune sortie cinéma à venir parmi vos favoris</p></div>';
  } else {
    for (const m of cinema) {
      gridCinema.appendChild(makePosterEl(m, {
        showIcs: true,
        showDays: true,
        ...(m._cinemaDate ? { release_date: m._cinemaDate } : {}),
      }));
    }
  }

  gridStream.innerHTML = '';
  if (!stream.length) {
    gridStream.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📺</div><p>Aucune sortie streaming à venir parmi vos favoris</p></div>';
  } else {
    for (const m of stream) {
      gridStream.appendChild(makePosterEl(m, {
        showStreamLabel: true,
        streamLabel: m._streamPlatforms && m._streamPlatforms.length
          ? m._streamPlatforms.join(' · ')
          : (m._digitalDate ? fmtDate(m._digitalDate) : 'Bientôt'),
      }));
    }
  }

  const ab = document.getElementById('badge-agenda');
  const total = cinema.length + stream.length;
  ab.textContent = total || '';
  ab.classList.toggle('visible', total > 0);
}

function renderAgenda() {
  const gridCinema = document.getElementById('grid-agenda-cinema');
  const gridStream = document.getElementById('grid-agenda-stream');

  if (!S.favs.length) {
    const msg = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">★</div><p>Ajoutez des films en favoris pour voir leurs sorties à venir.</p></div>';
    gridCinema.innerHTML = msg;
    gridStream.innerHTML = msg;
    try { localStorage.removeItem(AGENDA_CACHE_KEY); } catch(e) {}
    document.getElementById('badge-agenda').classList.remove('visible');
    return;
  }

  // 1) Paint cached result instantly (no spinner) if we have one.
  const cache = loadAgendaCache();
  if (cache && cache.cinema && cache.stream) {
    paintAgenda(cache.cinema, cache.stream);
  } else {
    gridCinema.innerHTML = '<div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><span>Chargement…</span></div>';
    gridStream.innerHTML = '<div class="loader-wrap" style="grid-column:1/-1"><div class="spinner"></div><span>Chargement…</span></div>';
  }

  // 2) Refresh in the background; the display only changes once done.
  refreshAgenda();
}

async function refreshAgenda() {
  if (_agendaRefreshing) return;
  _agendaRefreshing = true;

  const sub = document.getElementById('agenda-sub');
  const subPrev = sub ? sub.textContent : '';
  if (sub) sub.textContent = 'Mise à jour…';

  const today = new Date(); today.setHours(0,0,0,0);
  const cinemaUpcoming = [];
  const streamUpcoming = [];

  function findRelease(country, types) {
    if (!country) return null;
    for (const t of types) {
      const rd = country.release_dates.find(r => r.type === t && r.release_date);
      if (rd) return rd.release_date;
    }
    return null;
  }

  try {
    for (const fav of S.favs) {
      if (fav.watched) continue; // watched movies no longer "upcoming"
      try {
        const [detail, rdData, wpData] = await Promise.all([
          tmdb('/movie/' + fav.id),
          tmdb('/movie/' + fav.id + '/release_dates'),
          tmdb('/movie/' + fav.id + '/watch/providers'),
        ]);

        const frReleases = (rdData.results || []).find(r => r.iso_3166_1 === 'FR');
        const cinemaDate = findRelease(frReleases, [3]) || detail.release_date;
        const digitalDate = findRelease(frReleases, [4]);

        const fr = (wpData.results || {}).FR || {};
        const platforms = fr.flatrate ? fr.flatrate.slice(0,4).map(p => p.provider_name) : [];

        // Keep only the lightweight fields paintAgenda needs (serializable cache)
        const base = {
          id: detail.id,
          title: detail.title,
          original_title: detail.original_title,
          poster_path: detail.poster_path,
          backdrop_path: detail.backdrop_path,
          release_date: detail.release_date,
          vote_average: detail.vote_average,
        };

        if (cinemaDate && new Date(cinemaDate) >= today) {
          cinemaUpcoming.push({ ...base, _cinemaDate: cinemaDate });
        }
        if (digitalDate && new Date(digitalDate) >= today) {
          streamUpcoming.push({ ...base, _digitalDate: digitalDate, _streamPlatforms: platforms });
        } else if (platforms.length && (!cinemaDate || new Date(cinemaDate) < today)) {
          streamUpcoming.push({ ...base, _streamPlatforms: platforms });
        }
      } catch(e) {}
      await new Promise(r => setTimeout(r, 100));
    }

    cinemaUpcoming.sort((a,b) => new Date(a._cinemaDate||a.release_date) - new Date(b._cinemaDate||b.release_date));
    streamUpcoming.sort((a,b) => new Date(a._digitalDate||0) - new Date(b._digitalDate||0));

    // Persist + swap display (only now that the refresh is complete)
    saveAgendaCache(cinemaUpcoming, streamUpcoming);
    if (document.getElementById('tab-agenda').classList.contains('active')) {
      paintAgenda(cinemaUpcoming, streamUpcoming);
    } else {
      // tab not visible: still update the badge
      const ab = document.getElementById('badge-agenda');
      const total = cinemaUpcoming.length + streamUpcoming.length;
      ab.textContent = total || '';
      ab.classList.toggle('visible', total > 0);
    }
  } finally {
    if (sub) sub.textContent = subPrev || 'Sorties à venir de vos favoris';
    _agendaRefreshing = false;
  }
}

   FAVORITES RENDER
═══════════════════════════════════════════ */
let _favFilter = 'all';

function setFavFilter(filter, btn) {
  _favFilter = filter;
  document.querySelectorAll('#favFilters .filter-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderFavs();
}

async function renderFavs() {
  const grid = document.getElementById('grid-favs');
  const label = document.getElementById('favs-count-label');
  const filters = document.getElementById('favFilters');

  if (!S.favs.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">★</div><p>Ajoutez des films avec le bouton +</p></div>';
    label.textContent = '';
    filters.style.display = 'none';
    return;
  }

  // Counts
  const total = S.favs.length;
  const watched = S.favs.filter(f => f.watched).length;
  const toWatch = total - watched;
  document.getElementById('cnt-all').textContent = total;
  document.getElementById('cnt-towatch').textContent = toWatch;
  document.getElementById('cnt-watched').textContent = watched;
  filters.style.display = 'flex';

  label.textContent = total + ' film' + (total > 1 ? 's' : '');

  // Apply filter
  let list = S.favs;
  if (_favFilter === 'towatch') list = S.favs.filter(f => !f.watched);
  else if (_favFilter === 'watched') list = S.favs.filter(f => f.watched);

  // Sort: to-watch first by soonest release; watched by rating desc
  list = [...list].sort((a, b) => {
    if (!!a.watched !== !!b.watched) return a.watched ? 1 : -1;
    if (a.watched && b.watched) return (b.rating || 0) - (a.rating || 0);
    return new Date(a.release_date || 0) - new Date(b.release_date || 0);
  });

  grid.innerHTML = '';
  if (!list.length) {
    const msg = _favFilter === 'watched' ? 'Aucun film vu pour l\'instant' : 'Aucun film à voir — tout est vu !';
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🎬</div><p>' + msg + '</p></div>';
    return;
  }

  for (const fav of list) {
    // Fetch streaming platforms if not cached
    if (!fav._providers) {
      try {
        const wp = await tmdb('/movie/' + fav.id + '/watch/providers');
        const frp = (wp.results || {}).FR || {};
        fav._streamPlatforms = frp.flatrate ? frp.flatrate.slice(0,3).map(p => p.provider_name) : [];
        fav._providers = true;
        saveState();
      } catch(e) {}
    }
    grid.appendChild(makePosterEl(fav, { favExtras: true, favControls: true }));
  }
}

    inner.appendChild(backdropWrap);

    const content = document.createElement('div');
    content.className = 'modal-content';

      pph.className = 'modal-poster-ph'; pph.textContent = '🎬';

// Render the "Vu" toggle + star rating block inside the open modal.
function renderModalFavControls(movieId, favMovie, container) {
  const box = container || document.getElementById('modal-fav-controls');
  if (!box) return;
  box.innerHTML = '';
  if (!isFav(movieId)) return; // controls only relevant for favorites

  // Watched toggle button
  const wBtn = document.createElement('button');
  wBtn.className = 'modal-fav-btn' + (isWatched(movieId) ? ' saved' : '');
  wBtn.style.marginTop = '10px';
  wBtn.innerHTML = isWatched(movieId) ? '✓ Vu — remettre à voir' : '✓ Marquer comme vu';
  wBtn.addEventListener('click', () => {
    toggleWatched(favMovie);
    renderModalFavControls(movieId, favMovie, box);
  });
  box.appendChild(wBtn);

  // Star rating (only once watched)
  if (isWatched(movieId)) {
    const rTitle = document.createElement('div');
    rTitle.className = 'modal-section-title';
    rTitle.textContent = 'Ma note';
    rTitle.style.marginBottom = '6px';
    box.appendChild(rTitle);

    const row = document.createElement('div');
    row.className = 'modal-rating-row';
    const current = getRating(movieId);
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'm-star' + (current >= i*2 ? ' filled' : '');
      star.textContent = '★';
      star.addEventListener('click', () => {
        setRating(movieId, i*2);
        renderModalFavControls(movieId, favMovie, box);
      });
      row.appendChild(star);
    }
    if (current) {
      const val = document.createElement('span');
      val.className = 'card-rating-value';
      val.style.fontSize = '13px';
      val.textContent = current + '/10';
      row.appendChild(val);
      const clr = document.createElement('button');
      clr.className = 'modal-rating-clear';
      clr.textContent = 'Effacer';
      clr.addEventListener('click', () => {
        setRating(movieId, current); // clicking same value clears
        renderModalFavControls(movieId, favMovie, box);
      });
      row.appendChild(clr);
    }
    box.appendChild(row);
  }
}

function playTrailer(backdropWrap, key) {
  const wrap = document.createElement('div');
  wrap.className = 'trailer-iframe-wrap';
  const iframe = document.createElement('iframe');
  // enablejsapi + playsinline help inline playback on iOS; autoplay needs the tap (already given)
  iframe.src = 'https://www.youtube.com/embed/' + key + '?autoplay=1&playsinline=1&rel=0';
  iframe.allow = 'accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture';
  iframe.allowFullscreen = true;
  wrap.appendChild(iframe);
  backdropWrap.replaceWith(wrap);
}

let _personReqId = 0;

async function openPersonLayer(personId, personName, profilePath) {
  const layer  = document.getElementById('personLayer');
  const header = document.getElementById('personHeader');
  const scroll = document.getElementById('personScroll');
  const reqId  = ++_personReqId;

  // Header
  header.innerHTML = '';
  const back = document.createElement('button');
  back.className = 'person-back';
  back.textContent = '‹';
  back.title = 'Retour';
  back.addEventListener('click', closePersonLayer);
  header.appendChild(back);

  if (profilePath) {
    const img = document.createElement('img');
    img.className = 'person-photo';
    img.src = IMG_BASE + '/w185' + profilePath; img.alt = '';
    header.appendChild(img);
  } else {
    const ph = document.createElement('div'); ph.className = 'person-photo-ph'; ph.textContent = '👤';
    header.appendChild(ph);
  }
  const titleBlock = document.createElement('div');
  const nm = document.createElement('div'); nm.className = 'person-name'; nm.textContent = personName;
  const sub = document.createElement('div'); sub.className = 'person-sub'; sub.textContent = 'Filmographie';
  titleBlock.appendChild(nm); titleBlock.appendChild(sub);
  header.appendChild(titleBlock);

  scroll.innerHTML = '<div class="loader-wrap"><div class="spinner"></div><span>Chargement…</span></div>';
  layer.classList.add('open');
  scroll.scrollTop = 0;

  try {
    const data = await tmdb('/person/' + personId + '/movie_credits');
    if (reqId !== _personReqId) return; // a newer request superseded this

    // Acting roles, most recent first, de-duplicated by movie id
    const seen = new Set();
    let films = (data.cast || [])
      .filter(m => m.id && (m.poster_path || m.title))
      .filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; })
      .sort((a,b) => {
        const da = a.release_date || '0000';
        const db = b.release_date || '0000';
        return db.localeCompare(da);
      });

    const count = films.length;
    sub.textContent = count + ' film' + (count > 1 ? 's' : '');

    scroll.innerHTML = '';
    if (!films.length) {
      scroll.innerHTML = '<div class="empty-state"><div class="icon">🎬</div><p>Aucun film trouvé</p></div>';
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'person-grid';
    for (const m of films) {
      const card = document.createElement('div');
      card.className = 'pfilm';

      const pw = document.createElement('div');
      pw.className = 'pfilm-poster-wrap';
      if (m.poster_path) {
        const img = document.createElement('img');
        img.className = 'pfilm-poster';
        img.src = IMG_BASE + '/w185' + m.poster_path; img.alt = ''; img.loading = 'lazy';
        pw.appendChild(img);
      } else {
        const ph = document.createElement('div'); ph.className = 'pfilm-poster-ph'; ph.textContent = '🎬';
        pw.appendChild(ph);
      }
      card.appendChild(pw);

      const t = document.createElement('div');
      t.className = 'pfilm-title';
      t.textContent = m.title || m.original_title;
      card.appendChild(t);

      const year = (m.release_date || '').slice(0,4);
      if (year) {
        const y = document.createElement('div'); y.className = 'pfilm-year'; y.textContent = year;
        card.appendChild(y);
      }
      if (m.character) {
        const c = document.createElement('div'); c.className = 'pfilm-char'; c.textContent = m.character;
        card.appendChild(c);
      }

      // Tapping a film opens it in the main modal (under this layer),
      // then closes the layer to reveal it.
      card.addEventListener('click', () => {
        openMovieModal(m.id);
        closePersonLayer();
      });
      grid.appendChild(card);
    }
    scroll.appendChild(grid);

  } catch(e) {
    if (reqId !== _personReqId) return;
    scroll.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Erreur : ' + h(e.message) + '</p></div>';
  }
}

function closePersonLayer() {
  _personReqId++; // invalidate any in-flight request
  const layer = document.getElementById('personLayer');
  layer.classList.remove('open');
  document.getElementById('personScroll').innerHTML = '';
}

function closeModal() {
  // If the filmography layer is open, close just that first (back-to-modal)
  const layer = document.getElementById('personLayer');
  if (layer.classList.contains('open')) { closePersonLayer(); return; }

  _currentModalId = null;
  const inner = document.getElementById('modalInner');
  inner.innerHTML = ''; // stops any playing trailer iframe
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  // Reflect any changes made in the modal (note, vu/à voir) on the active tab
  if (document.getElementById('tab-favs').classList.contains('active')) renderFavs();
  else if (document.getElementById('tab-agenda').classList.contains('active')) renderAgenda();
}

function handleModalClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ═══════════════════════════════════════════
   ICS
═══════════════════════════════════════════ */
function fmtIcsLocal(dateStr, hour, min) {
  const d = new Date(dateStr);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(hour)}${pad(min)}00`;
}
function escIcs(s) {
  return (s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}

function downloadIcs(title, dateStr, type) {
  const uid = 'cinetracker-' + Date.now() + '@local';
  const now  = fmtIcsLocal(new Date().toISOString(), new Date().getHours(), new Date().getMinutes());
  const dtS  = fmtIcsLocal(dateStr, 20, 0);
  const dtE  = fmtIcsLocal(dateStr, 22, 30);
  const ics = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Ciné Tracker//FR','CALSCALE:GREGORIAN','METHOD:PUBLISH',
    'BEGIN:VEVENT',
    'UID:' + uid, 'DTSTAMP:' + now,
    'DTSTART;TZID=Europe/Paris:' + dtS,
    'DTEND;TZID=Europe/Paris:' + dtE,
    'SUMMARY:' + escIcs('🎬 ' + title + ' — ' + type),
    'DESCRIPTION:' + escIcs(type + ' : ' + title),
    'BEGIN:VALARM','TRIGGER:-PT60M','ACTION:DISPLAY',
    'DESCRIPTION:Sortie aujourd\'hui — ' + escIcs(title),
    'END:VALARM','END:VEVENT','END:VCALENDAR',
  ].join('\r\n');
  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = (title + '.ics').replace(/[/:*?"<>|]/g,'-'); a.click();
  URL.revokeObjectURL(url);
  showToast('📅 ' + title + ' ajouté au calendrier');
}

/* ═══════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════ */
function exportData() {
  const blob = new Blob([JSON.stringify({ version:2, exported:new Date().toISOString(), favorites:S.favs }, null, 2)], { type:'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'cinetracker.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ ' + S.favs.length + ' favori(s) exporté(s)');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.favorites || !Array.isArray(data.favorites)) throw new Error('Format invalide');
      let added = 0;
      for (const fav of data.favorites) {
        if (!fav.id || !fav.title) continue;
        if (!S.favs.some(f => f.id === fav.id)) { S.favs.push(fav); added++; }
      }
      saveState(); updateBadges();
      showToast(added > 0 ? '✓ ' + added + ' favori(s) importé(s)' : '⚠ Déjà tous présents');
    } catch(err) { showToast('✗ ' + err.message); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

/* ═══════════════════════════════════════════
   STREAMING AVAILABILITY DETECTION
   Daily check: for each "to-watch" favorite, compare current FR
   streaming platforms against the last stored snapshot. Newly added
   platforms surface as an alert banner in the Favoris tab.
═══════════════════════════════════════════ */
const STREAM_CHECK_KEY = 'cinetracker-stream-check';
const ONE_DAY = 24 * 60 * 60 * 1000;
let _newlyAvailable = []; // [{id, title, poster_path, added:[platforms]}]

async function checkStreamingAvailability(force=false) {
  if (!S.favs.length) return;

  // Daily throttle (cohérent avec le cache 12h/quotidien des autres apps)
  let lastCheck = 0;
  try { lastCheck = Number(localStorage.getItem(STREAM_CHECK_KEY)) || 0; } catch(e) {}
  if (!force && (Date.now() - lastCheck) < ONE_DAY) return;

  const toCheck = S.favs.filter(f => !f.watched);
  const found = [];

  for (const fav of toCheck) {
    try {
      const wp = await tmdb('/movie/' + fav.id + '/watch/providers');
      const frp = (wp.results || {}).FR || {};
      const current = frp.flatrate ? frp.flatrate.map(p => p.provider_name) : [];

      const prev = Array.isArray(fav._streamSnapshot) ? fav._streamSnapshot : null;
      // Newly added platforms = in current but not in previous snapshot
      if (prev !== null) {
        const added = current.filter(p => !prev.includes(p));
        if (added.length) {
          found.push({ id: fav.id, title: fav.title || fav.original_title, poster_path: fav.poster_path, added });
        }
      }
      // Update snapshot + the display field used by cards
      fav._streamSnapshot = current;
      fav._streamPlatforms = current.slice(0, 3);
      fav._providers = true;
    } catch(e) {}
    await new Promise(r => setTimeout(r, 70));
  }

  saveState();
  try { localStorage.setItem(STREAM_CHECK_KEY, String(Date.now())); } catch(e) {}

  _newlyAvailable = found;
  if (found.length) {
    showToast('📺 ' + found.length + ' favori(s) maintenant en streaming');
    renderStreamAlert();
  }
}

function renderStreamAlert() {
  const box = document.getElementById('streamAlert');
  if (!box) return;
  if (!_newlyAvailable.length) { box.innerHTML = ''; return; }

  box.innerHTML = '';
  const alert = document.createElement('div');
  alert.className = 'stream-alert';

  const head = document.createElement('div');
  head.className = 'stream-alert-head';
  const headTxt = document.createElement('span');
  headTxt.textContent = '📺 Nouveau en streaming';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'close';
  closeBtn.textContent = '✕';
  closeBtn.addEventListener('click', () => { _newlyAvailable = []; box.innerHTML = ''; });
  head.appendChild(headTxt); head.appendChild(closeBtn);
  alert.appendChild(head);

  for (const item of _newlyAvailable) {
    const row = document.createElement('div');
    row.className = 'stream-alert-item';
    if (item.poster_path) {
      const img = document.createElement('img');
      img.className = 'mini-poster';
      img.src = IMG_BASE + '/w92' + item.poster_path; img.alt = '';
      row.appendChild(img);
    }
    const txt = document.createElement('span');
    txt.innerHTML = '<strong>' + h(item.title) + '</strong> · ' + h(item.added.join(', '));
    row.appendChild(txt);
    row.addEventListener('click', () => openMovieModal(item.id));
    alert.appendChild(row);
  }
  box.appendChild(alert);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadState();
updateBadges();
// Streaming availability check runs in the background (daily throttle).
// Delayed so it doesn't compete with the first paint.
setTimeout(() => { checkStreamingAvailability().catch(()=>{}); }, 1200);
// Popular loads on first visit to that tab
</script>
